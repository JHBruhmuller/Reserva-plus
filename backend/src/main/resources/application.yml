spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/reserva_plus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: America/Sao_Paulo

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:troque-essa-chave-por-uma-chave-longa-em-producao}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
